paths:
  input_dir: input
  output_dir: output
  workspace_dir: workspace

runtime:
  resume: true
  overwrite: false
  log_level: INFO
  ffmpeg_bin: ffmpeg
  ffprobe_bin: ffprobe

asr:
  provider: qwen3_asr
  fallback_provider: faster_whisper
  language: zh
  sample_rate: 16000
  channels: 1
  qwen3_command: null
  qwen3_model_id: Qwen/Qwen3-ASR-0.6B
  qwen3_forced_aligner_id: Qwen/Qwen3-ForcedAligner-0.6B
  qwen3_device: auto
  qwen3_dtype: float32
  qwen3_attn_implementation: sdpa
  qwen3_max_new_tokens: 4096
  qwen3_max_segment_chars: 24
  qwen3_max_segment_ms: 4000
  faster_whisper_model: large-v3
  device: cpu
  compute_type: int8

translate:
  provider: openai_compatible
  model: deepseek-ai/DeepSeek-V3.2
  batch_size: 5
  max_words_per_minute: 140
  contextual_smoothing: false
  temperature: 0.1
  api_base_url: https://api.siliconflow.cn/v1
  api_key_env: SILICONFLOW_API_KEY
  request_timeout_seconds: 60
  anthropic_base_url: null
  anthropic_api_key_env: ANTHROPIC_API_KEY
  anthropic_auth_token_env: ANTHROPIC_AUTH_TOKEN
  claude_code_bin: claude
  claude_code_permission_mode: default
  claude_code_tools: ""

tts:
  provider: vibevoice_realtime
  fallback_provider: macos_say
  voice_mode: description
  voice_description: "A young adult, natural, energetic, clear American English voice"
  reference_wav: null
  max_tempo: 1.30
  min_segment_chars: 8
  merge_gap_ms: 250
  sentence_aware_merge: true
  sentence_merge_max_duration_ms: 17000
  sentence_merge_max_chars: 220
  smooth_merged_text: true
  sample_rate: 24000
  normalize_lufs: -16
  vibevoice_realtime_command: null
  vibevoice_model_path: microsoft/VibeVoice-Realtime-0.5B
  vibevoice_repo_dir: null
  vibevoice_voice_prompt_pt: null
  vibevoice_speaker_name: Carter
  vibevoice_device: auto
  vibevoice_cfg_scale: 1.5
  voxcpm2_command: null
  voxcpm2_base_url: http://127.0.0.1:8000
  voxcpm_hf_model_id: openbmb/VoxCPM-0.5B
  kokoro_command: null
  macos_voice: Samantha

subtitle:
  font_name: Arial
  font_size: 12
  margin_v: 14
  alignment: 2
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline: 2
  shadow: 1

compose:
  audio_mode: dub_plus_bgm
  enable_source_separation: true
  source_separation_provider: demucs
  source_separation_model: htdemucs
  source_separation_device: cpu
  bgm_gain_db: -12
  video_codec: libx264
  crf: 23
  preset: medium
  audio_codec: aac
  audio_bitrate: 192k
